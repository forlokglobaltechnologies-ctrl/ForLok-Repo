# ForLok Mobile – Play Store CI/CD
# - Push to `main` → build and deploy to Play Store PRODUCTION track.
# - Push to `playstore` branch → build and deploy to Play Store INTERNAL track (closed testing).
# Requires GitHub secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS,
# ANDROID_KEY_PASSWORD, PLAY_STORE_SERVICE_ACCOUNT_JSON. See PLAY_STORE_DEPLOY.md.

name: Play Store Deploy

on:
  push:
    branches:
      - main
      - playstore
    paths:
      - 'mobile-app/**'
      - '.github/workflows/play-store.yml'

env:
  PACKAGE_NAME: com.forlok.mobile

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json

      - name: Set track from branch
        id: track
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "track=production" >> $GITHUB_OUTPUT
            echo "Building for production (main)."
          else
            echo "track=internal" >> $GITHUB_OUTPUT
            echo "Building for internal track (playstore branch)."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode production keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. Add your release keystore (base64) for Play Store builds."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release-keystore.jks
          echo "Keystore decoded successfully."

      - name: Build release AAB
        env:
          RELEASE_STORE_FILE: release-keystore.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -PRELEASE_STORE_FILE=release-keystore.jks \
            -PRELEASE_STORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"
          cd ..

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: ${{ github.workspace }}/mobile-app/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload AAB to Google Play
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: ${{ github.workspace }}/mobile-app/android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ steps.track.outputs.track }}
          status: completed
